<!DOCTYPE html>
<html>
<head>
  <title>Jogo de RPG com Justick</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #jogador {
      font-size: 24px;
      font-weight: bold;
    }
    #acao {
      font-size: 18px;
    }
    button {
      width: 100px;
      height: 30px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Jogo de RPG com Justick</h1>
  <p id="jogador">Justick (Nível 1)</p>
  <p id="acao"></p>
  <button id="atacar">Atacar</button>
  <button id="defender">Defender</button>
  <button id="curar">Curar</button>

  <script>
    let jogador = {
      nome: 'Justick',
      nivel: 1,
      vida: 100,
      ataque: 10,
      defesa: 5
    };

    let inimigo = {
      nome: 'Monstro',
      nivel: 1,
      vida: 50,
      ataque: 5,
      defesa: 2
    };

    document.getElementById('atacar').addEventListener('click', atacar);
    document.getElementById('defender').addEventListener('click', defender);
    document.getElementById('curar').addEventListener('click', curar);

    function atualizarJogador() {
      document.getElementById('jogador').innerHTML = `${jogador.nome} (Nível ${jogador.nivel}) - Vida: ${jogador.vida}`;
    }

    function atualizarAcao(texto) {
      document.getElementById('acao').innerHTML = texto;
    }

    function atacar() {
      let dano = jogador.ataque - inimigo.defesa;
      if (dano > 0) {
        inimigo.vida -= dano;
        atualizarAcao(`Você atacou o ${inimigo.nome} por ${dano} de dano!`);
      } else {
        atualizarAcao(`Você atacou o ${inimigo.nome}, mas não causou dano!`);
      }
      verificarVidaInimigo();
      inimigoAtaca();
    }

    function defender() {
      jogador.defesa += 5;
      atualizarAcao(`Você se defendeu! Sua defesa aumentou em 5.`);
      setTimeout(() => {
        jogador.defesa -= 5;
      }, 3000);
      inimigoAtaca();
    }

    function curar() {
      jogador.vida += 10;
      if (jogador.vida > 100) jogador.vida = 100;
      atualizarAcao(`Você se curou! Sua vida aumentou em 10.`);
      atualizarJogador();
      inimigoAtaca();
    }

    function inimigoAtaca() {
      let dano = inimigo.ataque - jogador.defesa;
      if (dano > 0) {
        jogador.vida -= dano;
        atualizarAcao(`O ${inimigo.nome} atacou você por ${dano} de dano!`);
      } else {
        atualizarAcao(`O ${inimigo.nome} atacou você, mas não causou dano!`);
      }
      verificarVidaJogador();
      atualizarJogador();
    }

    function verificarVidaInimigo() {
      if (inimigo.vida <= 0) {
        atualizarAcao(`Você derrotou o ${inimigo.nome}!`);
        inimigo = {
          nome: 'Monstro',
          nivel: 1,
          vida: 50,
          ataque: 5,
          defesa: 2
        };
      }
    }

    function verificarVidaJogador() {
      if (jogador.vida <= 0) {
        atualizarAcao(`Você morreu!`);
        jogador = {
          nome: 'Justick',
          nivel: 1,
          vida: 100,
          ataque: 10,
          defesa: 5
        };
      }
    }

    atualizarJogador();
  </script>
</body>
</html>
