<!DOCTYPE html>
<html>
<head>
  <title>Jogo da Cobra</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f0f0f0;
    }
    #canvas {
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="400" height="400"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const escala = 20;
    let cobra = [
      {x: 5, y: 5},
      {x: 6, y: 5},
      {x: 7, y: 5},
    ];
    let direcao = 'direita';
    let comida = {x: Math.floor(Math.random() * 19) + 1, y: Math.floor(Math.random() * 19) + 1};
    let pontos = 0;

    function desenhar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      cobra.forEach((parte) => {
        ctx.fillStyle = 'green';
        ctx.fillRect(parte.x * escala, parte.y * escala, escala, escala);
      });
      ctx.fillStyle = 'red';
      ctx.fillRect(comida.x * escala, comida.y * escala, escala, escala);
      ctx.font = '24px Arial';
      ctx.fillStyle = 'black';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Pontos: ${pontos}`, 10, 10);
    }

    function atualizar() {
      let cabeca = cobra[0];
      let novaCabeca;
      switch (direcao) {
        case 'cima':
          novaCabeca = {x: cabeca.x, y: cabeca.y - 1};
          break;
        case 'baixo':
          novaCabeca = {x: cabeca.x, y: cabeca.y + 1};
          break;
        case 'esquerda':
          novaCabeca = {x: cabeca.x - 1, y: cabeca.y};
          break;
        case 'direita':
          novaCabeca = {x: cabeca.x + 1, y: cabeca.y};
          break;
      }
      cobra.unshift(novaCabeca);
      if (novaCabeca.x === comida.x && novaCabeca.y === comida.y) {
        pontos++;
        comida = {x: Math.floor(Math.random() * 19) + 1, y: Math.floor(Math.random() * 19) + 1};
      } else {
        cobra.pop();
      }
      if (
        novaCabeca.x < 0 ||
        novaCabeca.x >= 20 ||
        novaCabeca.y < 0 ||
        novaCabeca.y >= 20 ||
        cobra.slice(1).some((parte) => parte.x === novaCabeca.x && parte.y === novaCabeca.y)
      ) {
        alert(`Fim de jogo! Pontuação: ${pontos}`);
        cobra = [
          {x: 5, y: 5},
          {x: 6, y: 5},
          {x: 7, y: 5},
        ];
        direcao = 'direita';
        pontos = 0;
        comida = {x: Math.floor(Math.random() * 19) + 1, y: Math.floor(Math.random() * 19) + 1};
      }
    }

    function loop() {
      atualizar();
      desenhar();
      setTimeout(loop, 100);
    }

    document.addEventListener('keydown('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp':
          if (direcao !== 'baixo') direcao = 'cima';
          break;
        case 'ArrowDown':
          if (direcao !== 'cima') direcao = 'baixo';
          break;
        case 'ArrowLeft':
          if (direcao !== 'direita') direcao = 'esquerda';
          break;
        case 'ArrowRight':
          if (direcao !== 'esquerda') direcao = 'direita';
          break;
      }
    });

    loop();
  </script>
</body>
</html>
