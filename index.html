<!DOCTYPE html>
<html>
<head>
  <title>Jogo da Cobra</title>
  <style>
    canvas {
      border: 1px solid black;
    }
    .controles {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .controles button {
      width: 80px;
      height: 80px;
      margin: 10px;
      font-size: 40px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="controles">
    <button id="cima">↑</button>
  </div>
  <div class="controles">
    <button id="esquerda">←</button>
    <button id="baixo">↓</button>
    <button id="direita">→</button>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const escala = 20;
    const linhas = canvas.height / escala;
    const colunas = canvas.width / escala;
    let cobra = [
      {x: Math.floor(colunas / 2), y: Math.floor(linhas / 2)},
    ];
    let direcao = 'direita';
    let comida = gerarComida();
    let pontos = 0;
    let velocidade = 100;

    document.addEventListener('keydown', (e) => {
      controlar(e.key);
    });
    document.getElementById('cima').addEventListener('click', () => controlar('ArrowUp'));
    document.getElementById('baixo').addEventListener('click', () => controlar('ArrowDown'));
    document.getElementById('esquerda').addEventListener('click', () => controlar('ArrowLeft'));
    document.getElementById('direita').addEventListener('click', () => controlar('ArrowRight'));

    function controlar(key) {
      switch (key) {
        case 'ArrowUp':
          if (direcao !== 'baixo') direcao = 'cima';
          break;
        case 'ArrowDown':
          if (direcao !== 'cima') direcao = 'baixo';
          break;
        case 'ArrowLeft':
          if (direcao !== 'direita') direcao = 'esquerda';
          break;
        case 'ArrowRight':
          if (direcao !== 'esquerda') direcao = 'direita';
          break;
      }
    }

    function gerarComida() {
      return {
        x: Math.floor(Math.random() * colunas),
        y: Math.floor(Math.random() * linhas),
      };
    }

    function desenhar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      cobra.forEach((parte) => {
        ctx.fillStyle = 'green';
        ctx.fillRect(parte.x * escala, parte.y * escala, escala, escala);
      });
      ctx.fillStyle = 'red';
      ctx.fillRect(comida.x * escala, comida.y * escala, escala, escala);
      let cabeca = cobra[0];
      let novaCabeca;
      switch (direcao) {
        case 'cima':
          novaCabeca = {x: cabeca.x, y: cabeca.y - 1};
          break;
        case 'baixo':
          novaCabeca = {x: cabeca.x, y: cabeca.y + 1};
          break;
        case 'esquerda':
          novaCabeca = {x: cabeca.x - 1, y: cabeca.y};
          break;
        case 'direita':
          novaCabeca = {x: cabeca.x + 1, y: cabeca.y};
          break;
      }
      cobra.unshift(novaCabeca);
      if (novaCabeca.x === comida.x && novaCabeca.y === comida.y) {
        pontos++;
        comida = gerarComida();
        if (pontos % 5 === 0) {
          velocidade -= 10;
          if (velocidade < 20) velocidade = 20;
        }
      } else {
        cobra.pop();
      }
      if (
        novaCabeca.x < 0 ||
        novaCabeca.x >= colunas ||
        novaCabeca.y < 0 ||
        novaCabeca.y >= linhas ||
        cobra.slice(1).some((parte) => parte.x === novaCabeca.x && parte.y === novaCabeca.y)
      ) {
        alert(`Fim de jogo! Pontuação: ${pontos}`);
        cobra = [
          {x: Math.floor(colunas / 2), y: Math.floor(linhas / 2)},
        ];
        direcao = 'direita';
        pontos = 0;
        velocidade = 100;
        comida = gerarComida();
      }
      ctx.font = '24px Arial';
      ctx.fillStyle = 'black';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Pontos: ${pontos}`, 10, 10);
    }

    setInterval(desenhar, velocidade);
  </script>
</body>
</html>
