<!DOCTYPE html>
<html>
<head>
  <title>Jogo de Clicker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #contador {
      font-size: 48px;
      font-weight: bold;
    }
    #botao {
      width: 150px;
      height: auto;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }
    #botao img {
      width: 100%;
      height: auto;
    }
    #upgrade {
      width: 200px;
      height: 50px;
      font-size: 24px;
      background-color: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #upgrade:hover {
      background-color: #3e8e41;
    }
    .particula {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #4CAF50;
      border-radius: 50%;
      animation: subir 1s;
    }
    @keyframes subir {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100px);
        opacity: 0;
      }
    }
    #loja {
      width: 300px;
      margin: 20px auto;
      padding: 20px;
      border: 2px solid #5D3FD3;
      border-radius: 8px;
      background-color: #E6E6FA;
    }
    #loja h2 {
      margin-top: 0;
      color: #5D3FD3;
    }
    #loja ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #loja li {
      margin-bottom: 15px;
      color: #2F4F4F;
    }
    #loja button {
      width: 100px;
      height: 30px;
      font-size: 16px;
      background-color: #5D3FD3;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #loja button:hover {
      background-color: #483D8B;
    }
    #som-icon {
      font-size: 24px;
      cursor: pointer;
    }
    #loja-icon {
      font-size: 24px;
      cursor: pointer;
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <h1>Jogo de Clicker</h1>
  <p id="contador">0</p>
  <button id="botao">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/9/9d/Minecraft_Steve.png/220px-Minecraft_Steve.png" alt="Steve do Minecraft">
  </button>
  <p id="mensagem"></p>
  <button id="upgrade">Upgrade (Custo: 10)</button>
  <p id="nivel">Nível: 1</p>
  <span id="loja-icon">&#128722;</span>
  <span id="som-icon">&#128266;</span>
  <div id="loja" style="display: none;">
    <h2>Loja</h2>
    <ul>
      <li>
        <span>Multiplicador x2 (Custo: 100)</span>
        <button id="comprar-multiplicador">Comprar</button>
      </li>
      <li>
        <span>Aumento de velocidade (Custo: 50)</span>
        <button id="comprar-velocidade">Comprar</button>
      </li>
    </ul>
  </div>
  <audio id="som-clique" src="">
  <audio id="som-upgrade" src="">
  <script>
    let contador = 0;
    let multiplicador = 1;
    let custo = 10;
    let nivel = 1;
    let velocidade = 1;
    let somAtivo = true;

    // Carregar progresso com verificação de valores válidos
    contador = parseInt(localStorage.getItem('contador')) || 0;
    multiplicador = parseInt(localStorage.getItem('multiplicador')) || 1;
    custo = parseInt(localStorage.getItem('custo')) || 10;
    nivel = parseInt(localStorage.getItem('nivel')) || 1;
    velocidade = parseInt(localStorage.getItem('velocidade')) || 1;

    document.getElementById('contador').innerHTML = contador;
    document.getElementById('nivel').innerHTML = `Nível: ${nivel}`;
    document.getElementById('upgrade').innerHTML = `Upgrade (Custo: ${custo})`;
    verificarMultiplicador(); // Chama ao carregar o jogo

    document.getElementById('botao').addEventListener('click', () => {
      contador += multiplicador * velocidade;
      document.getElementById('contador').innerHTML = contador;
      criarParticula();
      verificarMultiplicador();
      salvarProgresso();
      if (somAtivo) {
        document.getElementById('som-clique').play().catch(() => {}); // Trata erro do som vazio
      }
    });

    document.getElementById('upgrade').addEventListener('click', () => {
      if (contador >= custo) {
        multiplicador++;
        contador -= custo;
        custo *= 2;
        nivel++;
        document.getElementById('nivel').innerHTML = `Nível: ${nivel}`;
        document.getElementById('upgrade').innerHTML = `Upgrade (Custo: ${custo})`;
        document.getElementById('contador').innerHTML = contador;
        document.getElementById('mensagem').innerHTML = `Multiplicador aumentado para ${multiplicador}!`;
        setTimeout(() => {
          document.getElementById('mensagem').innerHTML = '';
        }, 3000);
        if (somAtivo) {
          document.getElementById('som-upgrade').play().catch(() => {});
        }
      }
      verificarMultiplicador();
      salvarProgresso();
    });

    document.getElementById('comprar-multiplicador').addEventListener('click', () => {
      if (contador >= 100) {
        multiplicador *= 2;
        contador -= 100;
        document.getElementById('contador').innerHTML = contador;
        document.getElementById('mensagem').innerHTML = `Multiplicador aumentado para ${multiplicador}!`;
        setTimeout(() => {
          document.getElementById('mensagem').innerHTML = '';
        }, 3000);
        if (somAtivo) {
          document.getElementById('som-upgrade').play().catch(() => {});
        }
      }
      verificarMultiplicador();
      salvarProgresso();
    });

    document.getElementById('comprar-velocidade').addEventListener('click', () => {
      if (contador >= 50) {
        velocidade++;
        contador -= 50;
        document.getElementById('contador').innerHTML = contador;
        document.getElementById('mensagem').innerHTML = `Velocidade aumentada para ${velocidade}!`;
        setTimeout(() => {
          document.getElementById('mensagem').innerHTML = '';
        }, 3000);
        if (somAtivo) {
          document.getElementById('som-upgrade').play().catch(() => {});
        }
      }
      verificarMultiplicador();
      salvarProgresso();
    });

    document.getElementById('som-icon').addEventListener('click', () => {
      somAtivo = !somAtivo;
      if (somAtivo) {
        document.getElementById('som-icon').innerHTML = '&#128266;';
      } else {
        document.getElementById('som-icon').innerHTML = '&#128263;';
      }
    });

    document.getElementById('loja-icon').addEventListener('click', () => {
      const loja = document.getElementById('loja');
      if (loja.style.display === 'none') {
        loja.style.display = 'block';
      } else {
        loja.style.display = 'none';
      }
    });

    function verificarMultiplicador() {
      if (contador >= custo) {
        document.getElementById('upgrade').disabled = false;
      } else {
        document.getElementById('upgrade').disabled = true;
      }
    }

    function criarParticula() {
      const particula = document.createElement('div');
      particula.classList.add('particula');
      particula.style.left = `${Math.random() * 100}px`;
      document.body.appendChild(particula);
      setTimeout(() => {
        particula.remove();
      }, 1000);
    }

    function salvarProgresso() {
      localStorage.setItem('contador', contador);
      localStorage.setItem('multiplicador', multiplicador);
      localStorage.setItem('custo', custo);
      localStorage.setItem('nivel', nivel);
      localStorage.setItem('velocidade', velocidade);
    }
  </script>
</body>
  </html>
