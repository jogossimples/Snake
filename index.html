<!DOCTYPE html>
<html>
<head>
  <title>Jogo da Cobra</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #3E8E41;
    }
    #canvas {
      width: 100%;
      height: 80vh;
      border: 1px solid black;
    }
    .controles {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .controles button {
      width: 80px;
      height: 80px;
      margin: 10px;
      font-size: 40px;
      border-radius: 10px;
      background-color: #ccc;
      border: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controles">
    <button id="cima">↑</button>
  </div>
  <div class="controles">
    <button id="esquerda">←</button>
    <button id="baixo">↓</button>
    <button id="direita">→</button>
    <button id="frente">F</button>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const escala = 20;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.8;
    const linhas = Math.floor(canvas.height / escala);
    const colunas = Math.floor(canvas.width / escala);
    let cobra = [
      {x: Math.floor(colunas / 2), y: Math.floor(linhas / 2)},
    ];
    let direcao = 'direita';
    let comida = gerarComida();
    let pontos = 0;
    let cobraBrilhando = false;
    let tempoBrilho = 0;
    let jogoIniciado = true;

    document.addEventListener('keydown', (e) => {
      if (jogoIniciado) controlar(e.key);
    });
    document.getElementById('cima').addEventListener('click', () => controlar('ArrowUp'));
    document.getElementById('baixo').addEventListener('click', () => controlar('ArrowDown'));
    document.getElementById('esquerda').addEventListener('click', () => controlar('ArrowLeft'));
    document.getElementById('direita').addEventListener('click', () => controlar('ArrowRight'));
    document.getElementById('frente').addEventListener('click', () => {
      switch (direcao) {
        case 'cima':
          controlar('ArrowUp');
          break;
        case 'baixo':
          controlar('ArrowDown');
          break;
        case 'esquerda':
          controlar('ArrowLeft');
          break;
        case 'direita':
          controlar('ArrowRight');
          break;
      }
    });

    function controlar(key) {
      switch (key) {
        case 'ArrowUp':
          if (direcao !== 'baixo') direcao = 'cima';
          break;
        case 'ArrowDown':
          if (direcao !== 'cima') direcao = 'baixo';
          break;
        case 'ArrowLeft':
          if (direcao !== 'direita') direcao = 'esquerda';
          break;
        case 'ArrowRight':
          if (direcao !== 'esquerda') direcao = 'direita';
          break;
      }
    }

    function gerarComida() {
      return {
        x: Math.floor(Math.random() * colunas),
        y: Math.floor(Math.random() * linhas),
      };
    }

    function desenhar() {
      if (jogoIniciado) {
        ctx.fillStyle = '         
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        cobra.forEach((parte, index) => {
          if (index === 0) {
            ctx.fillStyle = 'green';
            ctx.beginPath();
            ctx.arc(parte.x * escala + escala / 2, parte.y * escala + escala / 2, escala / 2, 0, 2 * Math.PI);
            ctx.fill();
          } else {
            if (cobraBrilhando) {
              ctx.fillStyle = tempoBrilho < 10 ? 'yellow' : 'green';
            } else {
              ctx.fillStyle = 'green';
            }
            ctx.fillRect(parte.x * escala, parte.y * escala, escala, escala);
          }
        });
        if (cobraBrilhando) {
          tempoBrilho++;
          if (tempoBrilho > 20) {
            cobraBrilhando = false;
            tempoBrilho = 0;
          }
        }
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(comida.x * escala + escala / 2, comida.y * escala + escala / 2, escala / 2, 0, 2 * Math.PI);
        ctx.fill();
        let cabeca = cobra[0];
        let novaCabeca;
        switch (direcao) {
          case 'cima':
            novaCabeca = {x: cabeca.x, y: cabeca.y - 1};
            break;
          case 'baixo':
            novaCabeca = {x: cabeca.x, y: cabeca.y + 1};
            break;
          case 'esquerda':
            novaCabeca = {x: cabeca.x - 1, y: cabeca.y};
            break;
          case 'direita':
            novaCabeca = {x: cabeca.x + 1, y: cabeca.y};
            break;
        }
        cobra.unshift(novaCabeca);
        if (novaCabeca.x === comida.x && novaCabeca.y === comida.y) {
          pontos++;
          comida = gerarComida();
          cobraBrilhando = true;
          tempoBrilho = 0;
        } else {
          cobra.pop();
        }
        if (
          novaCabeca.x < 0 ||
          novaCabeca.x >= colunas ||
          novaCabeca.y < 0 ||
          novaCabeca.y >= linhas ||
          cobra.slice(1).some((parte) => parte.x === novaCabeca.x && parte.y === novaCabeca.y)
        ) {
          alert(`Fim de jogo! Pontuação: ${pontos}`);
          cobra = [
            {x: Math.floor(colunas / 2), y: Math.floor(linhas / 2)},
          ];
          direcao = 'direita';
          pontos = 0;
          comida = gerarComida();
        }
        ctx.font = '24px Arial';
        ctx.fillStyle = 'black';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(`Pontos: ${pontos}`, 10, 10);
        setTimeout(desenhar, 100);
      }
    }

    desenhar();
  </script>
</body>
</html>
